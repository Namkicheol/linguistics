.kw4{background:rgba(183,28,28,.11);color:#b71c1c;padding:2px 7px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.88em}

.next-btn:hover{opacity:.88;transform:translateY(-1px)}
.next-btn.show{display:block;animation:fade .3s ease}
.score-card{display:none;text-align:center;padding:48px 24px}
.score-card.show{display:block;animation:up .5s ease}
.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#3b3f86,#7c83d9);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(59,63,134,.3)}

.restart-btn:hover{background:rgba(59,63,134,.1)}
.nd{width:28px;height:28px;border-radius:6px;border:1.5px solid #c5c8e8;background:#f7f8ff;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;color:#4a4d6a;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
.nd.cur{border-color:#3b3f86;background:#3b3f86;color:white}
.nd.ok{border-color:#3b3f86;background:rgba(59,63,134,.15);color:#2a2e6e}
.nd.ng{border-color:#c62828;background:rgba(198,40,40,.1);color:#c62828}
.nd:hover:not(.cur){opacity:.7}
#nav{display:flex;flex-wrap:wrap;gap:5px;max-width:720px;margin:0 auto 16px;padding:0 8px}
.mode-bar{max-width:720px;margin:0 auto 10px;padding:0 8px;display:flex;gap:8px}
.mode-btn{flex:1;padding:8px 14px;border-radius:8px;border:1.5px solid #c5c8e8;background:#f7f8ff;color:#4a4d6a;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.5px}
.mode-btn.active{background:#3b3f86;border-color:#3b3f86;color:#fff}

<script>
const Q=[

  /* ── ① c-command / binding 기본 ────────────────────────── */
  {src:"c-command",cat:"binding 정의",
   text:"<span class='kw1'>Binding</span> requires both <span class='kw2'>c-command</span> and <span class='kw2'>coindexation</span>: A binds B if and only if A c-commands B and A and B are coindexed.",
   ans:true,
   correct:"<span class='kw1'>Binding</span>의 정의가 정확하다 — c-command와 coindexation을 <strong>둘 다</strong> 요구한다.",
   why:"Binding은 단순한 동일 지시(coindexation)만으로 성립하지 않습니다. 선행사 A가 B를 c-command하면서 동시에 coindex돼야 binding이 성립합니다. 두 조건 중 하나라도 빠지면 그 요소는 free입니다.",
   source:"Refs 요지: A binds B iff A c-commands B and A and B are coindexed."},

  {src:"c-command",cat:"free 정의",
   text:"An expression is <span class='kw1'>free</span> when it has no c-commanding coindexed antecedent.",
   ans:true,
   correct:"<span class='kw1'>free</span> = not bound — c-commanding coindexed antecedent가 없는 상태.",
   why:"bound와 free는 상보적입니다. 어떤 요소를 c-command하면서 coindex된 선행사가 없으면 그 요소는 free입니다. Principle B/C는 특정 영역에서 요소가 free일 것을 요구합니다.",
   source:"Refs 요지: An element is free iff it is not bound (no c-commanding coindexed antecedent)."},

  {src:"c-command",cat:"c-command 정의",
   text:"A node <span class='kw1'>c-commands</span> its sisters and all of their descendants.",
   ans:true,
   correct:"<span class='kw1'>c-command</span>의 표준 정의 — 어떤 node는 자신의 sister와 그 sister가 지배하는 모든 것을 c-command한다.",
   why:"X 위로 처음 갈라지는 first branching node가 지배하는 모든 요소를 X가 c-command합니다. 직관적으로 X는 자신의 sister와 그 후손들을 c-command합니다. subject DP가 VP 내부 object를 c-command하는 것이 전형적 예입니다.",
   source:"Refs 요지: A node c-commands its sisters and all of their descendants. (Radford)"},

  {src:"c-command",cat:"possessor c-command 실패",
   text:"In <span class='kw4'>*The witness' testimony exposed themselves</span>, the possessor <em>the witness'</em> c-commands <em>themselves</em>.",
   ans:false,
   correct:"<em>the witness'</em>는 소유격 specifier 안에 갇혀 <em>themselves</em>를 <span class='kw2'>c-command하지 못한다</span> → 적법한 선행사 부재 → 비문.",
   why:"소유격 specifier(<em>the witness'</em>)는 큰 subject DP 내부에 갇혀 있어 그 위 first branching node가 <em>themselves</em>를 dominate하지 못합니다. The sentence is ungrammatical because Principle A is violated — the anaphor has no c-commanding antecedent within its governing category.",
   source:"Refs 요지: A possessor inside a subject DP fails to c-command outside it; the reflexive has no antecedent.",
   compare:[{title:"비문",desc:"*The witness' testimony exposed themselves."},{title:"정문",desc:"The witnesses exposed themselves."}]},

  {src:"c-command",cat:"subject c-command",
   text:"In <em>The witnesses exposed themselves</em>, the subject DP c-commands the reflexive <em>themselves</em>.",
   ans:true,
   correct:"subject DP <em>the witnesses</em>가 VP 내부 <em>themselves</em>를 <span class='kw2'>c-command</span> → Principle A 충족 → 정문.",
   why:"subject DP 위 first branching node(TP)가 VP와 그 안의 <em>themselves</em>를 dominate하므로 subject가 reflexive를 c-command합니다. 같은 절(=governing category) 안에서 bound되므로 Principle A를 충족합니다.",
   source:"Refs 요지: The subject DP c-commands the object reflexive within the same clause."},

  {src:"c-command",cat:"coindexation만으로 불충분",
   text:"Coindexation alone, without c-command, is enough to count as <span class='kw1'>binding</span>.",
   ans:false,
   correct:"틀리다. coindexation만으로는 부족하다 — <span class='kw2'>c-command</span>도 반드시 필요하다.",
   why:"binding은 c-command와 coindexation을 동시에 요구합니다. 같은 index를 공유해도 선행사가 그 요소를 c-command하지 못하면 binding이 아닙니다(예: 소유격 안 선행사). 그래서 c-command 없는 coindexation은 binding으로 치지 않습니다.",
   source:"Refs 요지: Coindexation without c-command does not constitute binding."},

  /* ── ② Principle A — anaphors ──────────────────────────── */
  {src:"Principle A",cat:"agreement 위반",
   text:"The sentence <span class='kw4'>*The actress blamed himself</span> is grammatical.",
   ans:false,
   correct:"비문이다. anaphor <em>himself</em>가 선행사 <em>the actress</em>와 <span class='kw2'>gender agreement</span>에 실패한다.",
   why:"reflexive는 선행사와 person·number·gender에서 일치해야 합니다. <em>the actress</em>(여성)와 <em>himself</em>(남성)는 gender가 어긋나므로 적법한 c-commanding antecedent가 없는 것과 같습니다. The sentence is ungrammatical because Principle A is violated — the anaphor is not properly bound in its governing category.",
   source:"Refs 요지: A reflexive must agree with its antecedent in person, number, and gender."},

  {src:"Principle A",cat:"anaphor not locally bound",
   text:"<span class='kw4'>*Brian hopes that Karen will forgive himself</span> violates <span class='kw1'>Principle A</span>.",
   ans:true,
   correct:"<span class='kw1'>Principle A</span> 위반이 맞다 — <em>himself</em>가 자기 governing category 안에서 bound되지 못한다.",
   why:"<em>himself</em>의 governing category는 종속절(<em>Karen will forgive himself</em>)이고 그 안에는 적법한 선행사가 없습니다. 선행사 <em>Brian</em>은 절 밖에 있습니다. The sentence is ungrammatical because Principle A is violated — the anaphor is not bound within its governing category.",
   source:"Refs 요지: An anaphor must be bound within its governing category; a higher-clause antecedent is too far."},

  {src:"Principle A",cat:"reciprocal number 위반",
   text:"The sentence <span class='kw4'>*The juror distrusts each other</span> is grammatical.",
   ans:false,
   correct:"비문이다. reciprocal <em>each other</em>는 복수 선행사를 요구하는데 <em>the juror</em>는 단수다.",
   why:"reciprocal anaphor <em>each other</em>는 의미상 복수 선행사를 필요로 합니다. 단수 <em>the juror</em>는 이를 만족시키지 못합니다. The sentence is ungrammatical because Principle A is violated — the anaphor lacks an appropriate plural antecedent in its governing category.",
   source:"Refs 요지: A reciprocal (each other) requires a plural antecedent within its governing category."},

  {src:"Principle A",cat:"anaphor에 선행사 부재",
   text:"The sentence <span class='kw4'>*Each other resigned</span> is grammatical.",
   ans:false,
   correct:"비문이다. reciprocal <em>each other</em>에 c-commanding 선행사가 전혀 없다.",
   why:"anaphor은 독립 지시를 가질 수 없어 반드시 c-commanding 선행사가 필요합니다. 주어 자리의 <em>each other</em>는 선행사가 없습니다. The sentence is ungrammatical because Principle A is violated — the anaphor is not bound (it has no c-commanding antecedent).",
   source:"Refs 요지: An anaphor with no c-commanding antecedent violates Principle A."},

  {src:"Principle A",cat:"finite 종속절 locality",
   text:"An anaphor inside a <span class='kw1'>finite</span> embedded clause may take its antecedent from the higher clause.",
   ans:false,
   correct:"틀리다. finite 종속절은 닫힌 <span class='kw2'>governing category</span>이므로 상위 절 선행사를 가질 수 없다.",
   why:"finite 종속절은 그 자체로 anaphor의 governing category를 형성하므로 anaphor은 그 절 안에서 bound돼야 합니다. 상위 절의 선행사는 너무 멀어 Principle A를 위반합니다. (ECM 비정형 보문에서는 domain이 확장되지만, finite 절에서는 닫혀 있습니다.)",
   source:"Refs 요지: An anaphor in a finite embedded clause cannot be bound from the higher clause."},

  {src:"Principle A",cat:"ECM domain 확장",
   text:"<em>Nora believes herself to be qualified</em> is grammatical.",
   ans:true,
   correct:"정문이다 — <span class='kw1'>ECM</span> 구문에서 matrix subject <em>Nora</em>가 <em>herself</em>의 governing category 안에서 bind한다.",
   why:"비정형/ECM 보문(<em>believe X to VP</em>)에서는 하위 subject 자리에 적법한 subject-binder가 없어 anaphor의 governing category가 matrix subject까지 확장됩니다. 따라서 <em>Nora</em>가 <em>herself</em>를 같은 domain 안에서 c-command·bind → Principle A 충족.",
   source:"Refs 요지: In ECM, the matrix subject lies within the anaphor's governing category and binds it.",
   compare:[{title:"정문 (anaphor)",desc:"Nora believes herself to be qualified."},{title:"비문 (pronoun)",desc:"*Nora believes her to be qualified. (her=Nora)"}]},

  {src:"Principle A",cat:"agreement + 선행사 부재",
   text:"The sentence <span class='kw4'>*The committee elected herself</span> is grammatical.",
   ans:false,
   correct:"비문이다 — <em>herself</em>가 적법한 선행사도 없고 number/gender agreement도 충족하지 못한다.",

const TOTAL=Q.length;
const SAVE_KEY='linguistics_binding_quiz_v1';
let cur=0,answers=new Array(TOTAL).fill(null),mode='normal',order=[...Array(TOTAL).keys()];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function freshStart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();if(mode==='random')order=shuffle([...Array(TOTAL).keys()]);saveProgress();document.getElementById('rb').style.display='none';render();}
function setMode(m){if(mode===m)return;mode=m;order=m==='random'?shuffle([...Array(TOTAL).keys()]):[...Array(TOTAL).keys()];cur=0;answers=new Array(TOTAL).fill(null);clearProgress();updateModeUI();render();}
function updateModeUI(){document.getElementById('btn-normal').classList.toggle('active',mode==='normal');document.getElementById('btn-random').classList.toggle('active',mode==='random');}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers,mode,order}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}
function getScore(){return answers.filter(a=>a&&a.correct).length;}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function jumpTo(i){cur=i;render();}
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">📊 비교 정리</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div>
    <div class="exp-answer"><div class="ans-label">핵심 정리</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">📖 상세 설명</div><p>${q.why}</p>
      <div class="sec-label">📌 Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[order[cur]];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button>
        </div>
        <div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div>
        <div>${renderExp(q,a.correct)}</div>
        <button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }else{
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button>
        </div>
        <div id="bd" class="badge"></div>
        <div id="ep"></div>
        <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }
}
function pick(val){
  const q=Q[order[cur]];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();
}
function next(){cur++;if(cur>=TOTAL){clearProgress();}else{saveProgress();}render();}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    if(saved.mode){mode=saved.mode;order=saved.order||[...Array(TOTAL).keys()];}
    const done=answers.filter(a=>a!==null).length;
    if(done>0){
      document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;
      document.getElementById('rb').style.display='block';
    }
  }
  updateModeUI();renderNav();render();
})();
</script>
</body>
</html>
