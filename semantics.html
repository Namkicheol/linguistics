<script>
const Q=[

  /* ── ① Sense vs Reference (denotation / connotation, deixis) ── */
  {src:"Sense / Reference",cat:"definition",
   text:"The expressions <em>the morning star</em> and <em>the evening star</em> share the same <span class='kw1'>reference</span> (the planet Venus) yet differ in <span class='kw1'>sense</span>.",
   ans:true,
   correct:"같은 <span class='kw1'>reference</span>(Venus)라도 <span class='kw1'>sense</span>는 다를 수 있다 — Frege의 고전적 구분.",
   why:"sense는 표현이 referent를 제시하는 방식(개념적 의미)이고 reference는 실세계 대상과의 관계입니다. 두 표현이 같은 대상(Venus)을 가리켜도 그것을 떠올리는 방식(아침에 보이는 별 / 저녁에 보이는 별)이 달라 sense가 구별됩니다.",
   source:"Refs 요지: Two expressions can share a referent but differ in sense (Frege's morning/evening star).",
   compare:[{title:"Sense",desc:"내적·개념적 의미 (제시 방식)"},{title:"Reference",desc:"실세계 referent와의 관계"}]},

  {src:"Sense / Reference",cat:"sense vs reference",
   text:"If two expressions pick out the same <span class='kw1'>referent</span> in the world, then they must also have the same <span class='kw4'>sense</span>.",
   ans:false,
   correct:"같은 reference라도 sense는 다를 수 있다 — <em>Venus</em> / <em>the morning star</em>처럼 동일 referent, 다른 sense.",
   why:"reference의 동일성이 sense의 동일성을 보장하지 않습니다. 한 referent를 서로 다른 방식으로 제시하는 표현들은 reference가 같아도 sense가 다릅니다. 이것이 Frege가 지적한 핵심입니다.",
   source:"Refs 요지: Sameness of reference does not entail sameness of sense."},

  {src:"Sense / Reference",cat:"denotation / connotation",
   text:"In standard usage, <span class='kw4'>denotation</span> and <span class='kw4'>connotation</span> are synonyms that pick out exactly the same aspect of a word's meaning.",
   ans:false,
   correct:"둘은 다르다. <span class='kw2'>denotation</span>=문자적·중심 의미, <span class='kw2'>connotation</span>=그 위에 얹히는 정서적·문화적 함축.",
   why:"denotation은 단어가 적용되는 대상의 집합, 즉 문자적 중심 의미입니다. connotation은 그것을 넘어서는 정서적·문화적 overtone입니다. 예를 들어 <em>thrifty</em>와 <em>stingy</em>는 denotation은 비슷하나 connotation이 정반대입니다.",
   source:"Refs 요지: Denotation = literal central meaning; connotation = affective/cultural overtones. They are distinct.",
   compare:[{title:"Denotation",desc:"문자적·중심 의미"},{title:"Connotation",desc:"정서적·문화적 함축"}]},

  {src:"Sense / Reference",cat:"deixis",
   text:"The expressions <em>here</em>, <em>now</em>, and <em>this</em> are <span class='kw1'>deictic expressions</span> that signal proximity (proximal) to the speaker.",
   ans:true,
   correct:"<em>here / now / this</em>는 화자에 가까움(<span class='kw2'>proximal</span>)을 나타내는 deictic expression이다.",
   why:"deictic expression은 발화 맥락에 의존해 지시 대상이 정해집니다. <em>here, now, this</em>는 proximal(화자에 가까움)을, <em>there, then, that</em>은 distal(화자에서 멈)을 나타냅니다.",
   source:"Refs 요지: here/now/this are proximal deictic expressions anchored to the speaker."},

  /* ── ② Synonymy & Antonymy ─────────────────────────────── */
  {src:"Antonymy",cat:"complementary",
   text:"<em>alive</em> and <em>dead</em> are <span class='kw1'>complementary antonyms</span>: negating one entails the positive of the other, with no middle ground.",
   ans:true,
   correct:"<em>alive/dead</em>는 <span class='kw1'>complementary antonym</span> — 한쪽의 부정이 다른쪽의 긍정을 함의하고 중간값이 없다.",
   why:"complementary(binary) antonym은 한쪽을 부정하면 곧 다른쪽이 됩니다. <em>not alive</em> = <em>dead</em>이며 중간 단계가 없어 정도 부사·비교급이 부자연스럽습니다. <em>pass/fail</em>, <em>present/absent</em>도 같은 부류입니다.",
   source:"Refs 요지: Complementary antonyms — negation of one entails the other; no intermediate values.",
   compare:[{title:"Complementary",desc:"alive/dead, pass/fail — 중간 없음"},{title:"Gradable",desc:"hot/cold, rich/poor — 중간값 있음"}]},

  {src:"Antonymy",cat:"converse (relational)",
   text:"<em>employer</em> and <em>employee</em> are <span class='kw1'>converse (relational) antonyms</span>: <em>A is B's employer</em> and <em>B is A's employee</em> paraphrase each other.",
   ans:true,
   correct:"<em>employer/employee</em>는 <span class='kw1'>converse(relational)</span> antonym — 같은 관계를 반대 시점에서 보며 서로 paraphrase가 된다.",
   why:"converse antonym은 두 entity 사이의 관계를 정반대 시점에서 기술합니다. <em>A is B's employer</em>가 참이면 <em>B is A's employee</em>도 반드시 참이어서 서로 paraphrase입니다. <em>buy/sell</em>, <em>above/below</em>도 같습니다.",
   source:"Refs 요지: Converse (relational) antonyms describe a relation from opposite viewpoints and paraphrase each other."},

  {src:"Antonymy",cat:"gradable 판별",
   text:"<em>hot</em> and <em>cold</em> are <span class='kw4'>complementary antonyms</span>, so there can be no intermediate value between them.",
   ans:false,
   correct:"<em>hot/cold</em>는 <span class='kw2'>gradable antonym</span>이다 — <em>warm, cool</em> 같은 중간값이 존재하고 비교급·정도 부사가 가능하다.",
   why:"gradable antonym은 척도상의 대립으로 중간값을 허용합니다. <em>hot–warm–cool–cold</em>처럼 단계가 있고 <em>hotter</em>, <em>very cold</em> 같은 비교급·정도 표현이 자연스럽습니다. complementary(중간 없음)와 구별됩니다.",
   source:"Refs 요지: hot/cold are gradable, not complementary — intermediate values exist (warm, cool)."},

  /* ── ③ Hyponymy, Meronymy, Prototype ───────────────────── */
  {src:"Hyponymy",cat:"entailment direction",
   text:"<em>sparrow</em> is a hyponym of <em>bird</em>, and <em>I saw a sparrow</em> entails <em>I saw a bird</em>.",
   ans:true,
   correct:"<em>sparrow</em>는 <em>bird</em>의 <span class='kw1'>hyponym</span>이고, hyponym은 superordinate를 <span class='kw2'>entail</span>한다.",
   why:"hyponymy는 의미 포함(종류 관계)입니다. hyponym(<em>sparrow</em>)이 superordinate(<em>bird</em>)를 entail합니다 — 참새를 봤다면 새를 본 것입니다. 역방향(새를 봤다고 참새를 본 것은 아님)은 성립하지 않습니다.",
   source:"Refs 요지: A hyponym entails its superordinate (sparrow ⊨ bird), but not vice versa."},

  {src:"Hyponymy",cat:"방향 함정",
   text:"Because <em>rose</em> is a hyponym of <em>flower</em>, the sentence <em>I bought a flower</em> entails <span class='kw4'>I bought a rose</span>.",
   ans:false,
   correct:"방향이 반대다. superordinate(<em>flower</em>)는 hyponym(<em>rose</em>)을 entail하지 <strong>않는다</strong>. 꽃을 샀다고 장미를 산 것은 아니다.",
   why:"entailment는 hyponym→superordinate 한 방향입니다. <em>I bought a rose</em>는 <em>I bought a flower</em>를 entail하지만 역은 성립하지 않습니다 — 카네이션을 샀을 수도 있기 때문입니다.",
   source:"Refs 요지: A superordinate does not entail its hyponym (flower ⊭ rose)."},

  {src:"Meronymy",cat:"meronymy vs hyponymy",
   text:"A <em>wheel</em> is a hyponym of <em>car</em>, since a wheel is a kind of car.",
   ans:false,
   correct:"<em>wheel</em>은 <em>car</em>의 부분이지 종류가 아니다 → hyponymy가 아니라 <span class='kw2'>meronymy</span>(부분–전체) 관계.",
   why:"meronymy는 부분–전체 관계이고 hyponymy는 종류 관계입니다. <em>wheel</em>은 <em>car</em>의 <strong>부분</strong>(meronym)이지 <em>car</em>의 한 <strong>종류</strong>가 아닙니다. <em>page∈book</em>, <em>petal∈flower</em>도 meronymy입니다.",
   source:"Refs 요지: wheel is a part of a car (meronymy), not a kind of car (hyponymy).",
   compare:[{title:"Hyponymy",desc:"kind-of (sparrow ⊂ bird)"},{title:"Meronymy",desc:"part-of (wheel ∈ car)"}]},

  {src:"Prototype",cat:"graded membership",
   text:"In prototype theory, every member of a category is an <span class='kw4'>equally typical</span> example of that category.",
   ans:false,
   correct:"범주 소속은 <span class='kw2'>graded</span>다 — 어떤 멤버는 다른 멤버보다 더 전형적이다(<em>robin</em>이 <em>penguin</em>보다 더 prototypical한 bird).",

const TOTAL=Q.length;
const SAVE_KEY='linguistics_semantics_quiz_v1';
let cur=0,answers=new Array(TOTAL).fill(null),mode='normal',order=[...Array(TOTAL).keys()];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function freshStart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();if(mode==='random')order=shuffle([...Array(TOTAL).keys()]);saveProgress();document.getElementById('rb').style.display='none';render();}
function setMode(m){if(mode===m)return;mode=m;order=m==='random'?shuffle([...Array(TOTAL).keys()]):[...Array(TOTAL).keys()];cur=0;answers=new Array(TOTAL).fill(null);clearProgress();updateModeUI();render();}
function updateModeUI(){document.getElementById('btn-normal').classList.toggle('active',mode==='normal');document.getElementById('btn-random').classList.toggle('active',mode==='random');}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers,mode,order}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}
function getScore(){return answers.filter(a=>a&&a.correct).length;}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function jumpTo(i){cur=i;render();}
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">📊 비교 정리</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div>
    <div class="exp-answer"><div class="ans-label">핵심 정리</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">📖 상세 설명</div><p>${q.why}</p>
      <div class="sec-label">📌 Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[order[cur]];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button>
        </div>
        <div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div>
        <div>${renderExp(q,a.correct)}</div>
        <button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }else{
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button>
        </div>
        <div id="bd" class="badge"></div>
        <div id="ep"></div>
        <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }
}
function pick(val){
  const q=Q[order[cur]];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();
}
function next(){cur++;if(cur>=TOTAL){clearProgress();}else{saveProgress();}render();}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    if(saved.mode){mode=saved.mode;order=saved.order||[...Array(TOTAL).keys()];}
    const done=answers.filter(a=>a!==null).length;
    if(done>0){
      document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;
      document.getElementById('rb').style.display='block';
    }
  }
  updateModeUI();renderNav();render();
})();
</script>
</body>
</html>
