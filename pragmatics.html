<script>
const Q=[

  /* ── A. Speech act 분류 (locutionary / illocutionary / perlocutionary) ── */
  {src:"Speech Acts",cat:"illocutionary act",
   text:"The <span class='kw1'>illocutionary act</span> of an utterance is the act performed via its communicative force, such as promising or warning.",
   ans:true,
   correct:"<span class='kw1'>illocutionary act</span>의 표준 정의로 정확하다 — 발화의 communicative force로 수행되는 행위.",
   why:"illocutionary act는 발화의 communicative force로 수행되는 행위(진술·요청·약속·경고 등 화자의 의도)입니다. 이 force가 illocutionary force입니다. locutionary act(기본 발화 자체)·perlocutionary act(청자에게 미친 효과)와 구분됩니다.",
   source:"Refs 요지: The illocutionary act is performed via the utterance's communicative force (= illocutionary force).",
   compare:[{title:"illocutionary",desc:"화자의 force/의도 (promise, warn)"},{title:"perlocutionary",desc:"청자에게 미친 effect"}]},

  {src:"Speech Acts",cat:"perlocutionary · 혼동",
   text:"The <span class='kw1'>perlocutionary act</span> refers to the speaker's intention or communicative force, independent of any effect on the hearer.",
   ans:false,
   correct:"perlocutionary act는 발화가 청자에게 일으키는 <span class='kw2'>effect</span>다 — 화자의 force/의도는 <span class='kw2'>illocutionary act</span>다.",
   why:"perlocutionary act는 발화가 청자에게 실제로 일으키는 의도된 효과(설득됨·놀람·문 닫음 등)입니다. 화자의 communicative force/의도는 illocutionary act에 해당합니다. 둘을 바꿔 진술했으므로 거짓입니다.",
   source:"Refs 요지: The perlocutionary act = the effect on the hearer; the speaker's force = the illocutionary act."},

  {src:"Speech Acts",cat:"locutionary act",
   text:"Producing the basic, meaningful linguistic expression itself — its sounds, words, and structure — is the <span class='kw1'>locutionary act</span>.",
   ans:true,
   correct:"<span class='kw1'>locutionary act</span> = 의미 있는 언어 표현(소리·단어·구조)을 산출하는 기본 발화 행위. 정확하다.",
   why:"locutionary act는 sense와 reference를 가진 의미 있는 언어 표현 자체를 만들어 내는 기본 발화 행위입니다. 외국어를 못 만들거나 혀가 굳으면 바로 이 locutionary act가 실패합니다.",
   source:"Refs 요지: The locutionary act is the basic act of uttering a meaningful linguistic expression."},

  {src:"Speech Acts",cat:"perlocutionary · 효과",
   text:"In the utterance <em>Watch out for the wet floor!</em>, the hearer's stopping in alarm is the <span class='kw1'>illocutionary act</span>.",
   ans:false,
   correct:"청자가 놀라 멈추는 것은 <span class='kw2'>perlocutionary</span> effect다 — warning이 illocutionary act다.",
   why:"<em>Watch out!</em>의 illocutionary act는 경고(warning)이고, 그 결과 청자가 놀라 멈추는 것은 perlocutionary effect입니다. 청자에게 미친 결과를 illocutionary로 진술했으므로 거짓입니다.",
   source:"Refs 요지: The hearer's reaction is the perlocutionary effect; the warning is the illocutionary act."},

  {src:"Speech Acts",cat:"force 가변성",
   text:"The same locutionary act can carry different <span class='kw1'>illocutionary forces</span> depending on context, e.g. <em>It's cold in here</em> as a statement or as a request to close a window.",
   ans:true,
   correct:"동일한 locutionary act가 맥락에 따라 다른 illocutionary force(진술 또는 요청)를 가질 수 있다. 정확하다.",
   why:"같은 문장 <em>It's cold in here</em>가 단순 진술일 수도, 난방·창문에 대한 간접 요청일 수도 있습니다. illocutionary force는 맥락에 따라 결정되므로, 하나의 locutionary act가 여러 force를 운반할 수 있습니다.",
   source:"Refs 요지: One locutionary act may carry different illocutionary forces by context."},

  /* ── B. Direct vs indirect speech act ── */
  {src:"Direct/Indirect",cat:"indirect 식별",
   text:"Using an interrogative such as <em>Could you close the window?</em> to make a request is an <span class='kw1'>indirect speech act</span>.",
   ans:true,
   correct:"의문형식을 능력 질문이 아니라 요청으로 쓰면 <span class='kw1'>indirect speech act</span>다. 정확하다.",
   why:"interrogative의 기본 기능은 질문입니다. <em>Could you…?</em>를 능력을 묻는 게 아니라 요청으로 쓰면 sentence type을 다른 기능으로 쓴 것이므로 indirect speech act입니다. 이런 간접 발화가 일반적으로 더 공손합니다.",
   source:"Refs 요지: An interrogative used as a request is an indirect speech act.",
   compare:[{title:"direct",desc:"sentence type ↔ 기본 기능"},{title:"indirect",desc:"sentence type ↔ 다른 기능"}]},

  {src:"Direct/Indirect",cat:"direct · 혼동",
   text:"A declarative sentence used to make a statement is an <span class='kw1'>indirect speech act</span>.",
   ans:false,
   correct:"declarative를 진술 기능으로 쓰면 기본 기능대로 쓴 것이므로 <span class='kw2'>direct speech act</span>다.",
   why:"declarative의 기본 기능은 statement입니다. 그 기본 기능 그대로 진술에 쓰였다면 direct speech act입니다. sentence type을 다른 기능으로 써야 indirect가 됩니다.",
   source:"Refs 요지: A declarative used to state is a direct speech act, not indirect."},

  {src:"Direct/Indirect",cat:"politeness",
   text:"Indirect speech acts are generally perceived as <span class='kw2'>more polite</span> than their direct (imperative) counterparts.",
   ans:true,
   correct:"indirect speech act는 대응되는 direct(명령형) 발화보다 일반적으로 더 공손하게 느껴진다. 정확하다.",
   why:"<em>Could you lower your voice?</em> 같은 간접 요청은 <em>Lower your voice.</em> 같은 직접 명령보다 상대의 face를 덜 위협해 더 공손하게 인식됩니다. 다만 청자가 문자 그대로 반응하면 의도된 force를 놓칠 위험이 있습니다.",
   source:"Refs 요지: Indirect speech acts are generally felt to be more polite than direct imperatives."},

  {src:"Direct/Indirect",cat:"primary force 누락",
   text:"In an indirect request like <em>Do you know what time it is?</em>, answering only <em>Yes</em> successfully fulfills the speaker's intended (primary) force.",
   ans:false,
   correct:"<em>Yes</em>만 답하는 것은 literal(direct) 반응일 뿐, 시간을 알려 달라는 intended <span class='kw2'>primary force</span>를 놓친 것이다.",
   why:"이 발화의 primary force는 시간을 알려 달라는 요청입니다. 청자가 문자 그대로의 yes/no 질문으로만 받아 <em>Yes</em>라고만 답하면 secondary(literal) force에 반응한 것이고 화자의 의도된 요청은 충족되지 못합니다.",
   source:"Refs 요지: Answering only Yes responds to the literal force and misses the intended request."},

  /* ── C. Performative / felicity ── */
  {src:"Performative",cat:"performative sense 4조건",
   text:"For a performative verb to have its performative sense, the utterance must be positive, present tense, first-person, and refer to a specific event.",
   ans:true,
   correct:"performative sense의 4조건(positive · present · first-person · specific event)으로 정확하다.",
   why:"performative verb가 행위를 수행하는 의미를 가지려면 positive·present tense·first-person agent·specific event 네 조건을 모두 충족해야 합니다. 하나라도 어기면 그 발화는 행위 수행이 아니라 단지 상태 기술(representative)이 됩니다. <em>hereby</em> 삽입 가능 여부가 보조 진단입니다.",
   source:"Refs 요지: Performative sense requires positive, present tense, first-person, and a specific event.",
   compare:[{title:"performative",desc:"positive·present·1st person·specific"},{title:"위반 시",desc:"merely describes a state (representative)"}]},

  {src:"Performative",cat:"past tense · 함정",
   text:"<em>I promised to bring the documents</em> (past tense) is a felicitous performative that constitutes a promise in the act of being uttered.",
   ans:false,
   correct:"과거시제라 performative sense가 없다 — 약속을 수행하는 게 아니라 과거 약속을 <span class='kw2'>기술</span>할 뿐이다.",
   why:"performative sense는 present tense를 요구합니다. <em>I promised…</em>는 과거시제이므로 발화로 약속을 수행하는 게 아니라 이미 한 약속을 진술하는 representative입니다. <em>I promise to bring…</em>이라야 발화가 곧 약속 행위가 됩니다.",
   source:"Refs 요지: A past-tense 'I promised' lacks performative sense; it describes, not performs."},

  /* ── D. Maxim identification (which maxim is flouted) ── */
  {src:"Maxims",cat:"Quantity",

  {src:"Maxims",cat:"Quality · 혼동",

  {src:"Implicature",cat:"cancellability",

  {src:"Presupposition",cat:"entailment vs presupposition",

  {src:"Politeness",cat:"face",

const TOTAL=Q.length;
const SAVE_KEY='linguistics_pragmatics_quiz_v1';
let cur=0,answers=new Array(TOTAL).fill(null),mode='normal',order=[...Array(TOTAL).keys()];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function freshStart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();if(mode==='random')order=shuffle([...Array(TOTAL).keys()]);saveProgress();document.getElementById('rb').style.display='none';render();}
function setMode(m){if(mode===m)return;mode=m;order=m==='random'?shuffle([...Array(TOTAL).keys()]):[...Array(TOTAL).keys()];cur=0;answers=new Array(TOTAL).fill(null);clearProgress();updateModeUI();render();}
function updateModeUI(){document.getElementById('btn-normal').classList.toggle('active',mode==='normal');document.getElementById('btn-random').classList.toggle('active',mode==='random');}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers,mode,order}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}
function getScore(){return answers.filter(a=>a&&a.correct).length;}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function jumpTo(i){cur=i;render();}
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">📊 비교 정리</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div>
    <div class="exp-answer"><div class="ans-label">핵심 정리</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">📖 상세 설명</div><p>${q.why}</p>
      <div class="sec-label">📌 Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[order[cur]];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button>
        </div>
        <div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div>
        <div>${renderExp(q,a.correct)}</div>
        <button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }else{
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button>
        </div>
        <div id="bd" class="badge"></div>
        <div id="ep"></div>
        <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }
}
function pick(val){
  const q=Q[order[cur]];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();
}
function next(){cur++;if(cur>=TOTAL){clearProgress();}else{saveProgress();}render();}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    if(saved.mode){mode=saved.mode;order=saved.order||[...Array(TOTAL).keys()];}
    const done=answers.filter(a=>a!==null).length;
    if(done>0){
      document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;
      document.getElementById('rb').style.display='block';
    }
  }
  updateModeUI();renderNav();render();
})();
</script>
</body>
</html>
